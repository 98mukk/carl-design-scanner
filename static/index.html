<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARL - Decode Elite Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/*
  CARL tokens.
  Palette: official Solana brand colors (solana.com/branding): purple #9945FF, green #14F195.
  Solana logomark/wordmark NOT used (prohibited by Solana Foundation trademark guidelines).
  Color rule: purple = identity + interactive accent. Green = action (primary CTA) and
  success state only. Nothing else gets color.
  Shape rule: buttons/inputs 12px, cards 16px, chips pill. Dark theme locked (brand tool).
  Type: Space Grotesk (angular grotesk, closest open face to Solana's 1980s-tech wordmark
  vibe; the brand kit ships no font) + IBM Plex Mono for extracted data.
*/
:root {
  --bg:            #0D0D12;
  --surface:       #15151C;
  --line:          rgba(232, 232, 240, 0.08);
  --line-strong:   rgba(232, 232, 240, 0.16);
  --text:          #F0F0F5;
  --text-dim:      #A3A3B2;
  --purple:        #9945FF;
  --purple-text:   #BE8CFF;   /* AA-safe tint for small text on --bg */
  --purple-soft:   rgba(153, 69, 255, 0.13);
  --green:         #14F195;
  --green-dim:     #0FCF80;
  --ink-on-green:  #0D0D12;
  --font-display: "Space Grotesk", system-ui, sans-serif;
  --font-mono:    "IBM Plex Mono", ui-monospace, monospace;
  --r-control: 12px;
  --r-card: 16px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { color-scheme: dark; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-display);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
:focus-visible { outline: 2px solid var(--purple); outline-offset: 2px; }

/* Nav */
nav {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 0.7rem;
  height: 64px; padding: 0 1.5rem;
  background: rgba(13, 13, 18, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.wordmark { font-weight: 700; font-size: 1.05rem; letter-spacing: 0.12em; }

/* Hero: asymmetric split, text left, mark right */
.hero {
  max-width: 1080px; margin: 0 auto;
  padding: 4.5rem 1.5rem 3rem;
  display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
  gap: 2.5rem; align-items: center;
}
.hero h1 {
  font-size: clamp(2.1rem, 4.5vw, 3.3rem);
  font-weight: 600; line-height: 1.06; letter-spacing: -0.02em;
  max-width: 15ch;
}
.hero h1 strong { color: var(--purple-text); font-weight: 600; }
.hero p {
  margin-top: 1rem; font-size: 1.05rem; line-height: 1.6;
  color: var(--text-dim); max-width: 40ch;
}
.spider { width: min(230px, 100%); justify-self: center; }

/* Scan form */
.scan {
  max-width: 1080px; margin: 0 auto; padding: 0 1.5rem 3.5rem;
}
.scan label {
  display: block; font-size: 0.88rem; font-weight: 500;
  margin-bottom: 0.5rem;
}
.scan .row { display: flex; gap: 0.6rem; }
.scan input {
  flex: 1; height: 52px; padding: 0 1rem;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--line-strong); border-radius: var(--r-control);
  font-family: var(--font-mono); font-size: 0.92rem;
  transition: border-color 180ms var(--ease);
}
.scan input:focus { outline: none; border-color: var(--purple); }
.scan input::placeholder { color: #6C6C7A; }
.scan button {
  height: 52px; padding: 0 1.5rem; border: none;
  background: var(--green); color: var(--ink-on-green);
  border-radius: var(--r-control);
  font-family: var(--font-display); font-weight: 700; font-size: 0.95rem;
  cursor: pointer;
  transition: background 140ms var(--ease), transform 140ms var(--ease);
}
.scan button:hover { background: var(--green-dim); }
.scan button:active { transform: scale(0.98); }
.scan button:disabled { opacity: 0.6; cursor: progress; }
.helper { margin-top: 0.5rem; font-size: 0.82rem; color: var(--text-dim); }
.field-error { margin-top: 0.5rem; font-size: 0.85rem; color: #FF7A85; display: none; }
.field-error.show { display: block; }

/* Report area */
#report { max-width: 1080px; margin: 0 auto; padding: 0 1.5rem 5rem; }
.report-head { border-top: 1px solid var(--line-strong); padding-top: 1.6rem; }
.report-head h2 { font-size: 1.35rem; font-weight: 600; }
.report-head a {
  font-family: var(--font-mono); font-size: 0.8rem;
  color: var(--purple-text); text-decoration: none;
}
.report-head a:hover { text-decoration: underline; }

.grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1rem; margin-top: 1.4rem;
}
.card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-card); padding: 1.3rem 1.4rem;
}
.card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.9rem; }
.card.wide { grid-column: 1 / -1; }

.chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.chip {
  display: inline-flex; align-items: center; gap: 0.45rem;
  padding: 0.3rem 0.7rem; border: 1px solid var(--line);
  border-radius: 999px;
  font-family: var(--font-mono); font-size: 0.76rem; color: var(--text-dim);
}
.chip i { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--line-strong); }

.pairs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem 1.2rem; }
.pairs span { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-dim); line-height: 1.9; }

.rulebook textarea {
  width: 100%; min-height: 180px; resize: vertical;
  background: var(--bg); color: var(--text);
  border: 1px solid var(--line); border-radius: var(--r-control);
  font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.8;
  padding: 1rem;
}
.rulebook textarea:focus { outline: none; border-color: var(--purple); }
.rulebook .note { margin-top: 0.6rem; font-size: 0.82rem; color: var(--text-dim); }
.copy-btn {
  margin-top: 0.9rem; padding: 0.6rem 1.3rem;
  background: var(--purple-soft); color: var(--purple-text);
  border: 1px solid var(--purple); border-radius: var(--r-control);
  font-family: var(--font-display); font-weight: 600; font-size: 0.85rem;
  cursor: pointer; transition: background 140ms var(--ease);
}
.copy-btn:hover { background: rgba(153, 69, 255, 0.24); }
.copy-btn.done { border-color: var(--green); color: var(--green); background: transparent; }

/* Loading: skeleton matching the report shape */
.skeleton .card { min-height: 130px; }
.skel-bar {
  height: 12px; border-radius: 6px; margin-bottom: 0.7rem;
  background: var(--line);
}
.skel-bar.w40 { width: 40%; } .skel-bar.w70 { width: 70%; } .skel-bar.w55 { width: 55%; }
@media (prefers-reduced-motion: no-preference) {
  .skel-bar {
    background: linear-gradient(90deg, var(--line) 25%, var(--line-strong) 50%, var(--line) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .hero > * { animation: rise 0.6s var(--ease) backwards; }
  .hero > div > * { animation: rise 0.6s var(--ease) backwards; }
  .hero p { animation-delay: 80ms; }
  .spider { animation: rise 0.7s var(--ease) 140ms backwards; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } }
}

.scan-error {
  border: 1px solid rgba(255, 122, 133, 0.4); border-radius: var(--r-card);
  padding: 1rem 1.3rem; color: #FF9AA2; font-size: 0.9rem;
}

@media (max-width: 760px) {
  .hero { grid-template-columns: 1fr; padding-top: 3rem; text-align: left; }
  .spider { width: 150px; justify-self: start; }
  .grid, .pairs { grid-template-columns: 1fr; }
  .scan .row { flex-direction: column; }
  .scan button { width: 100%; }
}
</style>
</head>
<body>

<nav>
  <svg width="24" height="24" viewBox="0 0 200 200" aria-hidden="true"><use href="#carl-spider"/></svg>
  <span class="wordmark">CARL</span>
</nav>

<header class="hero">
  <div>
    <h1>Decode the design. <strong>Keep the rules.</strong></h1>
    <p>Point CARL at any site. It crawls the page and returns the six rules that make the design work.</p>
  </div>

  <!-- CARL spider mark (own brand asset, user-commissioned). Solana palette, no Solana marks. -->
  <svg class="spider" viewBox="0 0 200 200" fill="none" role="img" aria-label="CARL spider mark">
    <defs>
      <linearGradient id="web-fade" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#9945FF"/>
        <stop offset="1" stop-color="#14F195"/>
      </linearGradient>
      <g id="carl-spider">
        <circle cx="100" cy="100" r="88" stroke="url(#web-fade)" stroke-opacity="0.22" stroke-width="1.5"/>
        <circle cx="100" cy="100" r="60" stroke="url(#web-fade)" stroke-opacity="0.32" stroke-width="1.5"/>
        <circle cx="100" cy="100" r="34" stroke="url(#web-fade)" stroke-opacity="0.45" stroke-width="1.5"/>
        <g stroke="#9945FF" stroke-width="5" stroke-linecap="round">
          <path d="M84 88 L48 56 L34 22"/>
          <path d="M116 88 L152 56 L166 22"/>
          <path d="M80 98 L36 92 L12 66"/>
          <path d="M120 98 L164 92 L188 66"/>
          <path d="M80 108 L38 122 L14 152"/>
          <path d="M120 108 L162 122 L186 152"/>
          <path d="M86 116 L60 150 L56 182"/>
          <path d="M114 116 L140 150 L144 182"/>
        </g>
        <ellipse cx="100" cy="118" rx="20" ry="26" fill="#9945FF"/>
        <circle cx="100" cy="86" r="13" fill="#9945FF"/>
        <circle cx="100" cy="86" r="6" fill="#0D0D12"/>
        <circle cx="100" cy="86" r="2.5" fill="#14F195"/>
        <circle cx="100" cy="112" r="9" fill="#0D0D12" fill-opacity="0.85"/>
        <circle cx="100" cy="112" r="4" fill="#14F195" fill-opacity="0.7"/>
      </g>
    </defs>
    <use href="#carl-spider"/>
  </svg>
</header>

<form class="scan" id="scanForm" novalidate>
  <label for="urlInput">Site URL</label>
  <div class="row">
    <input id="urlInput" type="text" inputmode="url" placeholder="apple.com" autocomplete="off" required>
    <button id="scanBtn" type="submit">Scan site</button>
  </div>
  <p class="helper" id="helper">CARL fetches one page and extracts its colors, type, shape, and structure.</p>
  <p class="field-error" id="fieldError" role="alert"></p>
</form>

<main id="report" aria-live="polite"></main>

<script>
const form = document.getElementById("scanForm");
const input = document.getElementById("urlInput");
const btn = document.getElementById("scanBtn");
const report = document.getElementById("report");
const fieldError = document.getElementById("fieldError");

const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const SKELETON = `
  <div class="skeleton">
    <div class="report-head"><div class="skel-bar w40"></div><div class="skel-bar w55"></div></div>
    <div class="grid">
      <div class="card"><div class="skel-bar w40"></div><div class="skel-bar w70"></div><div class="skel-bar w55"></div></div>
      <div class="card"><div class="skel-bar w40"></div><div class="skel-bar w70"></div><div class="skel-bar w55"></div></div>
      <div class="card"><div class="skel-bar w40"></div><div class="skel-bar w70"></div><div class="skel-bar w55"></div></div>
      <div class="card"><div class="skel-bar w40"></div><div class="skel-bar w70"></div><div class="skel-bar w55"></div></div>
    </div>
  </div>`;

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  fieldError.classList.remove("show");
  if (!input.value.trim()) {
    fieldError.textContent = "Enter a site URL first, like apple.com.";
    fieldError.classList.add("show");
    input.focus();
    return;
  }
  btn.disabled = true;
  btn.textContent = "Scanning";
  report.innerHTML = SKELETON;
  try {
    const res = await fetch("/scan", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({url: input.value.trim()})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "The scan failed.");
    render(data);
  } catch (err) {
    report.innerHTML = `<div class="scan-error">${esc(err.message)} Check the URL and your Firecrawl key in .env, then try again.</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Scan site";
  }
});

function render(d) {
  const colors = d.colors.map(c =>
    `<span class="chip"><i style="background:${esc(c.hex)}"></i>${esc(c.hex)}</span>`
  ).join("") || `<span class="chip">No inline hex colors found. The site's styles are likely in external files.</span>`;

  const fonts = d.fonts.map(f => `<span>${esc(f)}</span>`).join("") || "<span>None found inline</span>";
  const radii = d.radii.slice(0, 6).map(r => `<span>${esc(r)}</span>`).join("") || "<span>None found inline</span>";
  const sections = d.sections.slice(0, 8).map(s => `<span>${esc(s)}</span>`).join("") || "<span>No h1 or h2 headings found</span>";

  const rulebook =
`## Scan - ${d.url}
1. COLORS   - bg: ___  text: ___  ONE accent: ___  (candidates: ${d.colors.slice(0,4).map(c=>c.hex).join(" ")})
2. FONTS    - heading: ${d.fonts[0] || "___"}  body: ${d.fonts[1] || "___"}
3. SHAPE    - radii: ${d.radii.slice(0,3).join(", ") || "___"}
4. SECTIONS - ${d.sections.slice(0,5).join(" > ") || "___"}
5. THE ONE RULE - what kills the slop here?
6. STEAL THIS   - the one move to copy`;

  report.innerHTML = `
    <div class="report-head">
      <h2>${esc(d.title || "Scan report")}</h2>
      <a href="${esc(d.url)}" target="_blank" rel="noopener">${esc(d.url)}</a>
    </div>
    <div class="grid">
      <div class="card"><h3>Colors</h3><div class="chips">${colors}</div></div>
      <div class="card"><h3>Type</h3><div class="pairs">${fonts}</div></div>
      <div class="card"><h3>Shape</h3><div class="pairs">${radii}</div></div>
      <div class="card"><h3>Structure, top to bottom</h3><div class="pairs">${sections}</div></div>
      <div class="card wide rulebook">
        <h3>Rulebook draft</h3>
        <textarea id="rulebookText" aria-label="Rulebook draft">${esc(rulebook)}</textarea>
        <p class="note">Lines 1 to 4 are machine work. Lines 5 and 6 are yours: that part is taste.</p>
        <button type="button" class="copy-btn" id="copyBtn">Copy rulebook</button>
      </div>
    </div>`;

  document.getElementById("copyBtn").addEventListener("click", (e) => {
    navigator.clipboard.writeText(document.getElementById("rulebookText").value);
    e.target.textContent = "Copied";
    e.target.classList.add("done");
  });
}
</script>
</body>
</html>
